<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - التسميع الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        .btn-mic { background-color: #e74c3c; color: white; border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 30px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .btn-mic.recording { background-color: #c0392b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        #status { color: #7f8c8d; margin-top: 10px; min-height: 24px; }
        #transcript { margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; min-height: 100px; text-align: right; line-height: 1.6; background: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <h1>المصحف الشريف</h1>
    
    <select id="readerSelect">
        <option value="said">الشيخ السيد سعيد</option>
        <option value="tablawi">الشيخ محمد محمود الطبلاوي</option>
        <option value="minshawi">الشيخ محمد صديق المنشاوي</option>
        <option value="abdelbaset">الشيخ عبد الباسط عبد الصمد</option>
    </select>

    <button id="micBtn" class="btn-mic">🎤</button>
    <div id="status">اضغط على الميكروفون للبدء في التسميع</div>
    
    <div id="transcript" placeholder="النص المسجل سيظهر هنا..."></div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('status');
    const transcriptDiv = document.getElementById('transcript');
    
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'ar-SA';

        recognition.onstart = () => {
            status.innerText = "جاري الاستماع... ابدأ التسميع";
            micBtn.classList.add('recording');
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    transcriptDiv.innerHTML += event.results[i][0].transcript + ' ';
                }
            }
        };

        recognition.onerror = () => {
            status.innerText = "حدث خطأ في التعرف على الصوت";
            micBtn.classList.remove('recording');
        };

        recognition.onend = () => {
            status.innerText = "تم إيقاف الاستماع";
            micBtn.classList.remove('recording');
        };
    }

    micBtn.onclick = () => {
        if (micBtn.classList.contains('recording')) {
            recognition.stop();
        } else {
            recognition.start();
        }
    };
</script>

</body>
</html>
